<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>SwiftCheck Terminal</title> <script src="https://cdn.tailwindcss.com"></script> <style> body { background: #020617; color: white; font-family: sans-serif; } .hidden { display: none; } </style> </head> <body class="p-4"> <div class="max-w-md mx-auto bg-slate-900 p-6 rounded-2xl border border-slate-800"> <h1 class="text-xl font-bold mb-4">Gate Terminal</h1> <div id="status" class="text-xs text-slate-400 mb-6">Status: Ready</div> <div class="flex gap-2"> <button onclick="initCamera()" class="flex-1 bg-indigo-600 p-3 rounded-lg font-bold">Start Camera</button> <button onclick="initNFC()" class="flex-1 bg-emerald-600 p-3 rounded-lg font-bold">Start NFC</button> </div> <div id="scanner-container" class="mt-6 border border-slate-700 rounded-lg overflow-hidden h-64 bg-black"> <!-- Camera/NFC feed appears here --> <div id="reader" class="w-full h-full"></div> </div> <div class="mt-6"> <input type="text" id="manual-input" placeholder="Manual ID..." class="w-full bg-slate-950 p-3 rounded-lg border border-slate-700 text-white"> <button onclick="submitManual()" class="w-full bg-slate-800 mt-2 p-3 rounded-lg font-bold">Submit Manual</button> </div> </div> <div id="log" class="max-w-md mx-auto mt-4 text-xs font-mono text-slate-500 space-y-1"></div> <script> const logBox = document.getElementById('log'); function log(msg) { logBox.innerHTML = "<div>> " + msg + "</div>" + logBox.innerHTML; } // Lazy load QR library only when requested function initCamera() { log("Loading camera engine..."); const script = document.createElement('script'); script.src = "https://unpkg.com/html5-qrcode"; script.onload = () => { log("Camera engine loaded. Starting..."); const reader = new Html5Qrcode("reader"); reader.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (data) => { sendToSheet(data, "QR"); reader.stop(); }, (err) => {} ).catch(e => log("Camera Error: " + e.message)); }; document.head.appendChild(script); } async function initNFC() { if (!('NDEFReader' in window)) return log("NFC not supported."); try { const ndef = new NDEFReader(); await ndef.scan(); log("NFC scanning..."); ndef.onreading = (e) => sendToSheet(e.serialNumber, "NFC"); } catch(e) { log("NFC Error: " + e.message); } } async function sendToSheet(id, method) { log("Sending " + id + " via " + method); const url = "https://script.google.com/macros/s/AKfycbxY2W-w8tktk7FC4gVxP4TyIrpxyFesbliRSx9YpOK3ftcCtY3YKDYurNfFwy8ydZUJ/exec?cardId=" + encodeURIComponent(id); try { const res = await fetch(url); const data = await res.json(); log("Server: " + JSON.stringify(data)); } catch(e) { log("Fetch Error: " + e.message); } } function submitManual() { const id = document.getElementById('manual-input').value; if (id) sendToSheet(id, "Manual"); } </script> </body> </html>
