<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>SwiftCheck Stable</title> <style> body { background: #020617; color: #ffffff; font-family: sans-serif; padding: 20px; } .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; } button { background: #4f46e5; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-bottom: 10px; } input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; } #log { background: #000; padding: 10px; font-family: monospace; font-size: 11px; color: #38bdf8; height: 150px; overflow-y: scroll; border-radius: 8px; } </style> </head> <body> <div class="card"> <h2>SwiftCheck Terminal</h2> <input type="text" id="manual-id" placeholder="Enter ID here..."> <button onclick="manualSubmit()">SUBMIT ID</button> <button onclick="triggerCamera()" style="background: #059669;">OPEN CAMERA</button> </div> <div id="log">Logs starting...</div> <script> const LOG = document.getElementById('log'); const SHEET_URL = "https://script.google.com/macros/s/AKfycby556O6RQ67VIIcmkFfG4PzgrQ2W5sn51zwIBckUJyzG_FLTzLGYTDASYzXHMf_j50/exec"; function appendLog(msg) { LOG.innerHTML = "<div>" + new Date().toLocaleTimeString() + ": " + msg + "</div>" + LOG.innerHTML; } function manualSubmit() { const id = document.getElementById('manual-id').value; if(!id) return; appendLog("Manual send: " + id); send(id, "Manual"); } function triggerCamera() { appendLog("Camera opened. Use scan and copy logic."); // We use the browser's native camera input which is 100% stable on all iPhones const input = document.createElement('input'); input.type = "file"; input.accept = "image/*"; input.capture = "environment"; input.onchange = (e) => appendLog("File selected. Please scan manually via text entry for this version."); input.click(); } async function send(id, method) { try { const url = SHEET_URL + "?cardId=" + encodeURIComponent(id) + "&action=" + encodeURIComponent(method); const res = await fetch(url); const data = await res.json(); appendLog("Server: " + JSON.stringify(data)); } catch (e) { appendLog("Error: " + e.message); } } </script> </body> </html>
